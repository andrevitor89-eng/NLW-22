<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipMaker | AI Viral Moments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #ffffff;
            --green: #4ade80;
            --dark-green: #16a34a;
        }

        body {
            font-family: "Inter", sans-serif;
            background-color: var(--bg);
            color: #1f2937;
            -webkit-font-smoothing: antialiased;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 2px solid var(--green);
        }

        .video-glow {
            box-shadow: 0 0 40px -10px rgba(74, 222, 128, 0.3);
        }

        .shimmer {
            background: linear-gradient(90deg,
                    rgba(74, 222, 128, 0) 0%,
                    rgba(74, 222, 128, 0.1) 50%,
                    rgba(74, 222, 128, 0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .upload-btn {
            transition: all 0.3s ease;
            background: linear-gradient(135deg, var(--green), var(--dark-green));
            color: white;
            font-size: 1.2rem;
            padding: 1rem 2rem;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 222, 128, 0.4);
        }

        .fun-icon {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        .input-field {
            border: 2px solid var(--green);
            border-radius: 15px;
            background: white;
            padding: 0.5rem 1rem;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--dark-green);
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }
    </style>
</head>

<body class="overflow-x-hidden">
    <!-- Fun Background Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-10 left-10 w-20 h-20 bg-green-200 rounded-full opacity-50"></div>
        <div class="absolute bottom-10 right-10 w-16 h-16 bg-green-300 rounded-full opacity-50"></div>
        <div class="absolute top-1/2 left-1/4 w-12 h-12 bg-green-400 rounded-full opacity-30"></div>
    </div>

    <main class="relative min-h-screen flex flex-col items-center">
        <!-- Header / Logo -->
        <header class="absolute top-0 w-full py-10 flex justify-center opacity-0 nav-el">
            <div class="flex items-center space-x-4 title-el">
                <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center shadow-lg shadow-green-300/50 fun-icon">
                    <i data-lucide="camera" class="w-7 h-7 text-white fill-current"></i>
                </div>
                <span class="text-3xl font-bold tracking-tighter text-green-700">ClipMaker</span>
                <span class="text-lg text-green-600">Faça vídeos Virais!</span>
            </div>
        </header>

        <div class="w-full max-w-4xl flex flex-col items-center text-center mt-40 px-10">

            <!-- Main CTA Section -->
            <div class="flex flex-col items-center space-y-8 mb-16 opacity-0 cta-el">
                <!-- API Key Input -->
                <div class="w-full max-w-md text-center">
                    <label for="api-key" class="block text-lg font-semibold text-green-700 mb-2">Coloque uma API Key Gemini:</label>
                    <div class="relative">
                        <input id="api-key" type="password"
                            class="input-field w-full text-gray-700 placeholder-gray-500 px-4 py-3 focus:outline-none text-base"
                            placeholder="Cole sua chave aqui..." />
                        <i data-lucide="key" class="absolute right-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-green-500"></i>
                    </div>
                </div>

                <button id="upload-widget"
                    class="upload-btn group relative flex items-center space-x-3 font-bold text-lg">
                    <i data-lucide="upload" class="w-8 h-8"></i>
                    <span>Enviar Vídeo!</span>
                </button>

                <!-- Loading State Display -->
                <div id="loading" class="hidden flex items-center space-x-3 text-green-700 font-medium tracking-wide text-lg">
                    <div class="w-3 h-3 bg-green-500 rounded-full animate-ping"></div>
                    <span id="loading-text">Procurando o momento divertido...</span>
                </div>

                <!-- Error Toast (Friendly) -->
                <div id="error"
                    class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-red-100 border-2 border-red-300 text-red-700 rounded-full text-sm font-medium">
                    <div class="flex items-center space-x-2">
                        <i data-lucide="alert-circle" class="w-5 h-5"></i>
                        <span id="error-message">Ops! Algo deu errado</span>
                    </div>
                </div>
            </div>

            <!-- Content Area: The Stage -->
            <div class="w-full opacity-0 video-el">
                <div class="glass video-glow rounded-[32px] p-4 aspect-video relative group overflow-hidden">
                    <!-- Video Placeholder / Background -->
                    <div id="placeholder"
                        class="absolute inset-0 flex flex-col items-center justify-center text-green-600 transition-all duration-700">
                        <div class="shimmer absolute inset-0 opacity-20"></div>
                        <i data-lucide="play-circle" class="w-20 h-20 mb-4 stroke-1 opacity-50 fun-icon"></i>
                        <p class="text-lg font-bold uppercase tracking-wider">
                            Pronto para o Vídeo!
                        </p>
                        <p class="text-sm text-green-500 mt-2">Envie seu vídeo e veja a magia acontecer!</p>
                    </div>

                    <!-- The Video Element -->
                    <video id="video" src=""
                        class="hidden w-full h-full object-cover rounded-[24px] shadow-2xl relative z-10"
                        controls></video>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Init Lucide Icons
        lucide.createIcons();

        // GSAP Intro Animation
        window.addEventListener("load", () => {
            const tl = gsap.timeline({
                defaults: { ease: "expo.out", duration: 1.5 },
            });
            tl.to(".nav-el", { opacity: 1, y: 0 })
                .to(".title-el", { opacity: 1, y: -10 }, "-=1.2")
                .to(".cta-el", { opacity: 1, y: -10 }, "-=1.3")
                .to(".video-el", { opacity: 1, scale: 1, y: 0 }, "-=1.3");
        });

        // HTML elements to interact with
        // O que aprende: variáveis, estrutura de dados e elementos DOM
        const el = {
            loading: document.getElementById("loading"),
            loadingText: document.getElementById("loading-text"),
            video: document.getElementById("video"),
            error: document.getElementById("error"),
            errorMessage: document.getElementById("error-message"),
            placeholder: document.getElementById("placeholder"),
            apiKey: document.getElementById("api-key"),
            uploadButton: document.getElementById("upload-widget"),
        };

        // app state and actions
        const app = {
            cloudName: "dhgdmbhtj",
            uploadPreset: "upload_video",
            transcriptionURL: "",
            public_id: "",
            waitForTranscription: async () => {
                const maxAttempts = 30;
                for (let i = 0; i < maxAttempts; i++) {
                    const currentUrl = `https://res.cloudinary.com/${app.cloudName}/raw/upload/v${Date.now()}/${app.public_id}.transcript`;
                    try {
                        const response = await fetch(currentUrl);
                        if (response.ok) {
                            app.transcriptionURL = currentUrl;
                            return true;
                        }
                    } catch (e) {
                        console.log("Fetch check error", e);
                    }
                    await new Promise((r) => setTimeout(r, 2000));
                }
                return false;
            },
            getTranscription: async () => {
                const response = await fetch(app.transcriptionURL);
                return response.text();
            },
            getViralMoment: async () => {
                const transcription = await app.getTranscription();
                const model = "gemini-2.5-flash";
                const apiKey = el.apiKey.value;
                if (!apiKey) throw new Error("API Key é obrigatória");

                const geminiEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

                const prompt = `
Role: You are a professional video editor specializing in viral content.
Task: Analyze the transcription below and identify the most engaging, funny, or surprising segment.
Constraints:
1. Duration: Minimum 30 seconds, Maximum 60 seconds.
2. Format: Return ONLY the start and end string for Cloudinary. Format: so_<start_seconds>,eo_<end_seconds>
3. Examples: "so_10,eo_20" or "so_12.5,eo_45.2"
4. CRITICAL: Do not use markdown, do not use quotes, do not explain. Return ONLY the raw string.

Transcription:
${transcription}
`;

                const header = {
                    "x-goog-api-key": apiKey,
                    "Content-Type": "application/json",
                };

                const contents = [
                    {
                        parts: [
                            {
                                text: prompt,
                            },
                        ],
                    },
                ];

                const response = await fetch(geminiEndpoint, {
                    method: "POST",
                    header,
                    body: JSON.stringify({ contents }),
                });

                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;

                return rawText.replace(/```/g, "").replace(/json/g, "").trim();
            },
        };

        const myWidget = cloudinary.createUploadWidget(
            {
                cloudName: app.cloudName,
                uploadPreset: app.uploadPreset,
                theme: "minimal",
                styles: {
                    palette: {
                        window: "#0F172A",
                        sourceList: "#0F172A",
                        activeTab: "#2563EB",
                        action: "#2563EB",
                        inactiveTabIcon: "#64748B",
                        menuIcons: "#64748B",
                        link: "#3B82F6",
                        textDark: "#000000",
                        textLight: "#FFFFFF",
                        mainShadow: "#000000",
                        background: "#020617",
                    },
                },
            },
            async (error, result) => {
                if (!error && result && result.event === "success") {
                    const { public_id } = result.info;
                    app.public_id = public_id;

                    try {
                        el.loading.classList.remove("hidden");
                        el.loadingText.innerText = "Aguardando transcrição...";
                        el.error.classList.add("hidden");

                        const isReady = await app.waitForTranscription();
                        if (!isReady) throw new Error("A transcrição demorou demais.");

                        el.loadingText.innerText = "Gerando momento viral com IA...";

                        const viralMoment = await app.getViralMoment();
                        const viralMomentURL = `https://res.cloudinary.com/${app.cloudName}/video/upload/${viralMoment}/${app.public_id}.mp4`;

                        // Display Video with Animation
                        el.video.setAttribute("src", viralMomentURL);
                        el.video.classList.remove("hidden");
                        el.placeholder.classList.add("opacity-0");

                        gsap.from(el.video, {
                            opacity: 0,
                            scale: 0.98,
                            filter: "blur(10px)",
                            duration: 1,
                        });
                    } catch (e) {
                        el.errorMessage.innerText = e.message || "Erro inesperado";
                        el.error.classList.remove("hidden");
                    } finally {
                        el.loading.classList.add("hidden");
                    }
                }
            },
        );

        el.uploadButton.addEventListener(
            "click",
            () => {
                if (!el.apiKey.value) {
                    alert("Ei! Você precisa colocar a chave mágica da IA primeiro. 😊");
                    el.apiKey.focus();
                    return;
                }
                myWidget.open();
            },
            false,
        );
    </script>
</body>

</html>
